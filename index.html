<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Rust Rocket Calculator</title>

<style>
* {
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: url("https://images.unsplash.com/photo-1506744038136-46273834b3fb") no-repeat center/cover;
}

/* Glass Container */
.container {
    width: 360px;
    padding: 30px;
    border-radius: 16px;
    backdrop-filter: blur(15px);
    background: rgba(20, 20, 30, 0.7);
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
    color: white;
}

/* Title */
h2 {
    text-align: center;
    color: #ff7a3d;
    margin-bottom: 20px;
}

/* Input Groups */
.group {
    margin-bottom: 18px;
}

label {
    font-size: 14px;
    color: #ccc;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 6px;
    border-radius: 8px;
    border: none;
    background: rgba(255,255,255,0.1);
    color: white;
    font-size: 15px;
}

input:focus {
    outline: none;
    background: rgba(255,255,255,0.15);
}

/* Result Box */
.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(255,255,255,0.08);
    font-size: 14px;
    line-height: 1.6;
}
</style>
</head>

<body>

<div class="container">
    <h2>🚀 Rocket Calculator</h2>

    <div class="group">
        <label>🚀 Rockets</label>
        <input type="number" id="rockets" placeholder="z.B. 10">
    </div>

    <div class="group">
        <label>🧨 Explosives</label>
        <input type="number" id="explosives" placeholder="z.B. 100">
    </div>

    <div class="group">
        <label>🪨 Sulfur</label>
        <input type="number" id="sulfur" placeholder="z.B. 2200">
    </div>

    <div class="result" id="output">
        Gib einen Wert ein 👆
    </div>
</div>

<script>
const EXPLOSIVES_PER_ROCKET = 10;
const SULFUR_PER_EXPLOSIVE = 220;
const SULFUR_PER_ROCKET = EXPLOSIVES_PER_ROCKET * SULFUR_PER_EXPLOSIVE;

const rocketsInput = document.getElementById("rockets");
const explosivesInput = document.getElementById("explosives");
const sulfurInput = document.getElementById("sulfur");
const output = document.getElementById("output");

function updateFromRockets() {
    let rockets = rocketsInput.value;
    if (!rockets) return;

    let explosives = rockets * EXPLOSIVES_PER_ROCKET;
    let sulfur = rockets * SULFUR_PER_ROCKET;

    explosivesInput.value = explosives;
    sulfurInput.value = sulfur;

    output.innerHTML = `
        🧨 Explosives: ${explosives}<br>
        🪨 Sulfur: ${sulfur}
    `;
}

function updateFromExplosives() {
    let explosives = explosivesInput.value;
    if (!explosives) return;

    let rockets = Math.floor(explosives / EXPLOSIVES_PER_ROCKET);
    let sulfur = explosives * SULFUR_PER_EXPLOSIVE;

    rocketsInput.value = rockets;
    sulfurInput.value = sulfur;

    output.innerHTML = `
        🚀 Rockets: ${rockets}<br>
        🪨 Sulfur: ${sulfur}
    `;
}

function updateFromSulfur() {
    let sulfur = sulfurInput.value;
    if (!sulfur) return;

    let rockets = Math.floor(sulfur / SULFUR_PER_ROCKET);
    let explosives = Math.floor(sulfur / SULFUR_PER_EXPLOSIVE);

    rocketsInput.value = rockets;
    explosivesInput.value = explosives;

    output.innerHTML = `
        🚀 Rockets: ${rockets}<br>
        🧨 Explosives: ${explosives}
    `;
}

/* Live Events */
rocketsInput.addEventListener("input", updateFromRockets);
explosivesInput.addEventListener("input", updateFromExplosives);
sulfurInput.addEventListener("input", updateFromSulfur);
</script>

</body>
</html>
